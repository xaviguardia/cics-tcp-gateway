<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <style>
      .box{stroke-width:2;rx:8}
      .label{font-family:'SF Mono',ui-monospace,SFMono-Regular,Menlo,monospace;fill:#e8ecf0}
      .sub{font-family:'SF Mono',ui-monospace,monospace;fill:#6b7a8d;font-size:10px}
      .arrow{stroke:#3a5a3a;stroke-width:2;stroke-dasharray:6,3;marker-end:url(#ah)}
      .arrow-data{stroke:#33ff33;stroke-width:2;stroke-opacity:.5;stroke-dasharray:6,3;marker-end:url(#ag)}
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3a5a3a"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#33ff33" opacity=".5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#060810"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="label" font-size="14" font-weight="700" fill="#33ff33">CICS TCP Gateway — System Architecture</text>

  <!-- ═══════════════ LEFT SIDE: Browser + Python ═══════════════ -->

  <!-- Browser -->
  <rect x="40" y="60" width="200" height="56" class="box" fill="#1a2030" stroke="#3a4a5e"/>
  <text x="140" y="84" text-anchor="middle" class="label" font-size="13" font-weight="600">Web Browser</text>
  <text x="140" y="100" text-anchor="middle" class="sub">SSE + fetch • port 8088</text>

  <!-- Arrow Browser → Python -->
  <line x1="140" y1="116" x2="140" y2="148" class="arrow"/>

  <!-- Python Proxy -->
  <rect x="40" y="150" width="200" height="56" class="box" fill="#1a2030" stroke="#60a5fa"/>
  <text x="140" y="174" text-anchor="middle" class="label" font-size="13" font-weight="600" fill="#60a5fa">Python Proxy</text>
  <text x="140" y="190" text-anchor="middle" class="sub">4 persistent TCP sessions</text>

  <!-- Arrow Python → TCP split into 4 lines -->
  <line x1="100" y1="206" x2="100" y2="248" class="arrow"/>
  <line x1="133" y1="206" x2="133" y2="248" class="arrow"/>
  <line x1="166" y1="206" x2="166" y2="248" class="arrow"/>
  <line x1="200" y1="206" x2="200" y2="248" class="arrow"/>

  <!-- TCP :4321 -->
  <rect x="60" y="250" width="180" height="32" rx="6" fill="#0a1a0a" stroke="#33ff33" stroke-opacity=".4"/>
  <text x="150" y="270" text-anchor="middle" class="label" font-size="11" fill="#33ff33" opacity=".7">TCP :4321 (binary protocol)</text>

  <!-- Arrow TCP → Hercules -->
  <line x1="150" y1="282" x2="150" y2="310" class="arrow-data"/>

  <!-- ═══════════════ RIGHT SIDE: Sensor stations ═══════════════ -->

  <!-- Station boxes -->
  <rect x="560" y="60" width="150" height="44" rx="6" fill="#0f1a0f" stroke="#4ade80"/>
  <text x="572" y="78" class="label" font-size="18">🌿</text>
  <text x="596" y="80" class="label" font-size="11" font-weight="600" fill="#4ade80">Botanical Garden</text>
  <text x="596" y="94" class="sub">Temp • Humidity</text>

  <rect x="730" y="60" width="150" height="44" rx="6" fill="#1a1a0a" stroke="#f59e0b"/>
  <text x="742" y="78" class="label" font-size="18">🏭</text>
  <text x="766" y="80" class="label" font-size="11" font-weight="600" fill="#f59e0b">Urban Air Quality</text>
  <text x="766" y="94" class="sub">CO₂ • PM2.5</text>

  <rect x="560" y="118" width="150" height="44" rx="6" fill="#0a1020" stroke="#60a5fa"/>
  <text x="572" y="136" class="label" font-size="18">🌊</text>
  <text x="596" y="138" class="label" font-size="11" font-weight="600" fill="#60a5fa">River Delta</text>
  <text x="596" y="152" class="sub">Water Temp • O₂</text>

  <rect x="730" y="118" width="150" height="44" rx="6" fill="#10081a" stroke="#a78bfa"/>
  <text x="742" y="136" class="label" font-size="18">☀️</text>
  <text x="766" y="138" class="label" font-size="11" font-weight="600" fill="#a78bfa">Solar Array</text>
  <text x="766" y="152" class="sub">Output kW • Eff %</text>

  <!-- Bracket from stations to "each session = 1 CICS txn" -->
  <path d="M555,82 L540,82 L540,140 L555,140" stroke="#3a4a5e" stroke-width="1.5" fill="none"/>
  <line x1="540" y1="111" x2="500" y2="111" stroke="#3a4a5e" stroke-width="1.5"/>
  <text x="497" y="107" text-anchor="end" class="sub" font-size="9">Each station =</text>
  <text x="497" y="118" text-anchor="end" class="sub" font-size="9">1 CICS session</text>

  <!-- ═══════════════ HERCULES BOX ═══════════════ -->

  <rect x="20" y="314" width="860" height="190" rx="12" fill="none" stroke="#33ff33" stroke-width="1.5" stroke-opacity=".25" stroke-dasharray="8,4"/>
  <text x="450" y="336" text-anchor="middle" class="label" font-size="11" fill="#33ff33" opacity=".4">HERCULES / DOCKER (--privileged)</text>

  <!-- MVS box -->
  <rect x="40" y="346" width="820" height="145" rx="10" fill="#0a120a" stroke="#33ff33" stroke-width="1.5" stroke-opacity=".4"/>
  <text x="450" y="368" text-anchor="middle" class="label" font-size="14" font-weight="700" fill="#33ff33">MVS 3.8j — IBM System/370 CPU</text>

  <!-- Three components inside MVS -->

  <!-- KICKGWX -->
  <rect x="70" y="382" width="240" height="50" rx="6" fill="#0f1f0f" stroke="#4ade80" stroke-width="1.5"/>
  <text x="190" y="403" text-anchor="middle" class="label" font-size="12" font-weight="600" fill="#4ade80">KICKGWX Gateway</text>
  <text x="190" y="420" text-anchor="middle" class="sub">X'75' non-blocking event loop</text>
  <text x="190" y="430" text-anchor="middle" class="sub">8 concurrent sessions • KGCC C</text>

  <!-- Arrow KICKGWX → KICKS -->
  <line x1="310" y1="407" x2="350" y2="407" class="arrow-data"/>

  <!-- KICKS/CICS -->
  <rect x="352" y="382" width="220" height="50" rx="6" fill="#1a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="462" y="403" text-anchor="middle" class="label" font-size="12" font-weight="600" fill="#f59e0b">KICKS / CICS</text>
  <text x="462" y="420" text-anchor="middle" class="sub">KIKPCP LINK dispatch</text>
  <text x="462" y="430" text-anchor="middle" class="sub">CSA • TCA • EIB initialization</text>

  <!-- Arrow KICKS → Program -->
  <line x1="572" y1="407" x2="612" y2="407" class="arrow-data"/>

  <!-- CICS Programs -->
  <rect x="614" y="382" width="220" height="50" rx="6" fill="#0f0f1a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="724" y="403" text-anchor="middle" class="label" font-size="12" font-weight="600" fill="#a78bfa">CICS Programs</text>
  <text x="724" y="420" text-anchor="middle" class="sub">GWDEMO (built-in counter)</text>
  <text x="724" y="430" text-anchor="middle" class="sub">KLASTCCG • any KIKRPL program</text>

  <!-- ═══════════════ PROTOCOL DETAIL ═══════════════ -->

  <!-- Request format -->
  <rect x="310" y="200" width="240" height="60" rx="6" fill="#10141c" stroke="#1a2030"/>
  <text x="430" y="218" text-anchor="middle" class="label" font-size="10" font-weight="600">Request Frame</text>
  <text x="430" y="232" text-anchor="middle" class="sub" font-size="9">8B program (EBCDIC) + 4B length + N commarea</text>
  <text x="430" y="246" text-anchor="middle" class="sub" font-size="9">│GWDEMO  │00000004│........│</text>

  <!-- Response format -->
  <rect x="310" y="268" width="240" height="60" rx="6" fill="#10141c" stroke="#1a2030"/>
  <text x="430" y="286" text-anchor="middle" class="label" font-size="10" font-weight="600">Response Frame</text>
  <text x="430" y="300" text-anchor="middle" class="sub" font-size="9">4B return code + 4B length + N payload</text>
  <text x="430" y="314" text-anchor="middle" class="sub" font-size="9">│00000000│0000001C│MVS 3.8 ...│</text>

  <!-- Arrows connecting protocol to TCP -->
  <line x1="300" y1="266" x2="240" y2="266" stroke="#3a4a5e" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══════════════ ANNOTATIONS ═══════════════ -->

  <!-- X'75' annotation -->
  <rect x="580" y="200" width="190" height="78" rx="6" fill="#0a0c10" stroke="#1a2030"/>
  <text x="675" y="218" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#33ff33">X'75' TCPIP Instruction</text>
  <text x="675" y="234" text-anchor="middle" class="sub" font-size="9">2-phase conversation per op</text>
  <text x="675" y="248" text-anchor="middle" class="sub" font-size="9">R3=0: guest→host (execute)</text>
  <text x="675" y="262" text-anchor="middle" class="sub" font-size="9">R3=1: host→guest (results)</text>
  <text x="675" y="274" text-anchor="middle" class="sub" font-size="9">DC X'75005000'</text>

  <!-- Performance annotation -->
  <text x="450" y="476" text-anchor="middle" class="sub" font-size="10">CPU: ~10% idle (STIMER WAIT SVC 47) • ~60% under load with 4 sessions at 1 req/sec</text>
  <text x="450" y="492" text-anchor="middle" class="sub" font-size="10">Latency: sub-millisecond CICS dispatch • No OTel on z/OS — this gateway bridges the observability gap</text>
  <text x="450" y="508" text-anchor="middle" class="sub" font-size="9" fill="#33ff33" opacity=".4">Each request = 1 real CICS transaction processed by a System/370 CPU running MVS 3.8</text>
</svg>
